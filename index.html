<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Block Thread Notes</title>
<style>
  :root{
    --bg:#0f1420; --panel:#161d2e; --panel2:#1c2436; --line:#2a3450;
    --accent:#4f8cff; --accent2:#ff6b6b; --text:#e8ecf5; --muted:#8a94ab;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,Segoe UI,Roboto,Arial,sans-serif;overflow:hidden;}
  #toolbar{
    position:fixed;top:0;left:0;right:0;height:52px;background:var(--panel);
    border-bottom:1px solid var(--line);display:flex;align-items:center;gap:8px;
    padding:0 12px;z-index:20;
  }
  #toolbar .grp{display:flex;gap:6px;align-items:center;border-right:1px solid var(--line);padding-right:10px;margin-right:4px;}
  #toolbar .grp:last-child{border-right:none;}
  button, input[type=text], select{
    background:var(--panel2);color:var(--text);border:1px solid var(--line);
    border-radius:6px;padding:6px 10px;font-size:13px;cursor:pointer;
  }
  button:hover{border-color:var(--accent);}
  button.active{background:var(--accent);border-color:var(--accent);color:#fff;}
  #boardName{width:160px;cursor:text;}
  #canvasWrap{position:absolute;top:52px;left:0;right:0;bottom:0;overflow:hidden;cursor:grab;}
  #canvasWrap.connecting{cursor:crosshair;}
  svg#canvas{width:100%;height:100%;display:block;background-size:24px 24px;
    background-image:radial-gradient(circle,#232c42 1px,transparent 1px);}
  .block-card{cursor:move;}
  .block-rect{fill:#1c2436;stroke:#3a4568;stroke-width:1.5;rx:8;}
  .block-rect.selected{stroke:var(--accent);stroke-width:2.5;}
  .block-tag{font-size:10px;fill:var(--muted);font-weight:600;}
  .block-title{font-size:13px;fill:var(--text);font-weight:600;}
  .block-desc{font-size:11px;fill:var(--muted);}
  .thread-path{fill:none;stroke:#5a6a92;stroke-width:2;cursor:pointer;}
  .thread-path.selected{stroke:var(--accent);stroke-width:3;}
  .thread-label{font-size:10px;fill:var(--muted);pointer-events:none;}
  .port{fill:#5a6a92;stroke:#0f1420;stroke-width:1;cursor:crosshair;}
  .port:hover{fill:var(--accent);}
  #modalOverlay{
    position:fixed;inset:0;background:rgba(0,0,0,.55);display:none;
    align-items:center;justify-content:center;z-index:100;
  }
  #modalOverlay.show{display:flex;}
  .modal{background:var(--panel);border:1px solid var(--line);border-radius:10px;
    padding:20px;width:360px;max-width:90vw;}
  .modal h3{margin:0 0 14px;font-size:15px;}
  .modal label{display:block;font-size:12px;color:var(--muted);margin:10px 0 4px;}
  .modal input[type=text], .modal textarea, .modal input[type=color]{
    width:100%;background:var(--panel2);border:1px solid var(--line);color:var(--text);
    border-radius:6px;padding:8px;font-size:13px;font-family:inherit;
  }
  .modal textarea{resize:vertical;min-height:60px;}
  .modal .actions{display:flex;justify-content:space-between;margin-top:16px;gap:8px;}
  .modal .actions .left{display:flex;gap:8px;}
  #boardsList{max-height:260px;overflow-y:auto;margin-top:10px;}
  .boardRow{display:flex;justify-content:space-between;align-items:center;
    padding:8px;border-bottom:1px solid var(--line);font-size:13px;}
  .boardRow button{padding:3px 8px;font-size:11px;}
  #toast{
    position:fixed;bottom:20px;left:50%;transform:translateX(-50%);
    background:var(--panel2);border:1px solid var(--accent);color:var(--text);
    padding:10px 16px;border-radius:8px;font-size:13px;z-index:200;display:none;
  }
  a{color:var(--accent);}
  #fileImportInput{display:none;}
</style>
</head>
<body>

<div id="toolbar">
  <div class="grp">
    <input type="text" id="boardName" value="Untitled Board" title="Board name">
  </div>
  <div class="grp">
    <button id="btnSelect" class="active" title="Select tool (V)">V Select</button>
    <button id="btnConnect" title="Connect tool (C)">C Connect</button>
    <button id="btnAddBlock" title="Add block (N)">+ Block</button>
  </div>
  <div class="grp">
    <button id="btnSave" title="Save to localStorage">💾 Save</button>
    <button id="btnBoards" title="Browse saved boards">📂 Boards</button>
    <button id="btnCopyLink" title="Copy shareable link">🔗 Copy Link</button>
  </div>
  <div class="grp">
    <button id="btnExportJson" title="Export board as JSON">📥 Export JSON</button>
    <button id="btnImportJson" title="Import board from JSON">📤 Import JSON</button>
    <button id="btnExportCsv" title="Export blocks/threads as CSV">📊 Export CSV</button>
  </div>
  <div class="grp">
    <button id="btnFit" title="Fit to screen">⊡ Fit</button>
  </div>
</div>

<div id="canvasWrap">
  <svg id="canvas">
    <defs>
      <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
        <path d="M0,0 L10,5 L0,10 z" fill="#5a6a92"></path>
      </marker>
    </defs>
    <g id="viewport">
      <g id="threadsLayer"></g>
      <g id="blocksLayer"></g>
    </g>
  </svg>
</div>

<input type="file" id="fileImportInput" accept="application/json">

<div id="modalOverlay">
  <div class="modal" id="modalContent"></div>
</div>

<div id="toast"></div>

<script>
(function(){
  const NS = "http://www.w3.org/2000/svg";
  const svg = document.getElementById('canvas');
  const viewport = document.getElementById('viewport');
  const blocksLayer = document.getElementById('blocksLayer');
  const threadsLayer = document.getElementById('threadsLayer');
  const canvasWrap = document.getElementById('canvasWrap');
  const boardNameInput = document.getElementById('boardName');

  let state = { blocks: [], threads: [] };
  let view = { x:0, y:0, scale:1 };
  let tool = 'select';
  let selected = { type:null, id:null };
  let dragging = null;
  let connectFrom = null;
  let panStart = null;

  function uid(prefix){ return prefix + Math.random().toString(36).slice(2,9); }
  function toast(msg){
    const t = document.getElementById('toast');
    t.textContent = msg; t.style.display='block';
    clearTimeout(t._h);
    t._h = setTimeout(()=> t.style.display='none', 2200);
  }

  function screenToWorld(sx, sy){
    return { x: (sx - view.x) / view.scale, y: (sy - view.y) / view.scale };
  }

  function applyView(){
    viewport.setAttribute('transform', `translate(${view.x},${view.y}) scale(${view.scale})`);
    svg.style.backgroundPosition = `${view.x}px ${view.y}px`;
    svg.style.backgroundSize = `${24*view.scale}px ${24*view.scale}px`;
  }

  function newBlock(x,y){
    return { id: uid('b'), tag: 'TAG-' + Math.floor(Math.random()*900+100),
      label: 'New Block', desc: '', x, y, w:160, h:70, color:'#0f3460' };
  }

  function addBlock(){
    const rect = canvasWrap.getBoundingClientRect();
    const c = screenToWorld(rect.width/2, rect.height/2);
    const b = newBlock(c.x-80, c.y-35);
    state.blocks.push(b);
    render();
    selectItem('block', b.id);
  }

  function portPositions(b){
    return {
      top:{x:b.x+b.w/2, y:b.y},
      bottom:{x:b.x+b.w/2, y:b.y+b.h},
      left:{x:b.x, y:b.y+b.h/2},
      right:{x:b.x+b.w, y:b.y+b.h/2}
    };
  }

  function nearestPorts(a,b){
    const pa = portPositions(a), pb = portPositions(b);
    let best=null,bd=Infinity;
    for(const ka in pa) for(const kb in pb){
      const dx=pa[ka].x-pb[kb].x, dy=pa[ka].y-pb[kb].y;
      const d=dx*dx+dy*dy;
      if(d<bd){bd=d;best={from:pa[ka],to:pb[kb]};}
    }
    return best;
  }

  function bezierPath(p1,p2){
    const dx = (p2.x-p1.x)*0.5;
    return `M ${p1.x},${p1.y} C ${p1.x+dx},${p1.y} ${p2.x-dx},${p2.y} ${p2.x},${p2.y}`;
  }

  function findBlock(id){ return state.blocks.find(b=>b.id===id); }

  function render(){
    blocksLayer.innerHTML = '';
    threadsLayer.innerHTML = '';

    state.threads.forEach(t=>{
      const a = findBlock(t.fromId), b = findBlock(t.toId);
      if(!a||!b) return;
      const pts = nearestPorts(a,b);
      const g = document.createElementNS(NS,'g');
      const path = document.createElementNS(NS,'path');
      path.setAttribute('class','thread-path' + (selected.type==='thread'&&selected.id===t.id?' selected':''));
      path.setAttribute('d', bezierPath(pts.from, pts.to));
      path.setAttribute('marker-end','url(#arrow)');
      path.dataset.id = t.id;
      path.addEventListener('mousedown', e=>{ e.stopPropagation(); selectItem('thread', t.id); });
      path.addEventListener('dblclick', e=>{ e.stopPropagation(); openThreadModal(t.id); });
      g.appendChild(path);
      if(t.label){
        const mx=(pts.from.x+pts.to.x)/2, my=(pts.from.y+pts.to.y)/2;
        const label = document.createElementNS(NS,'text');
        label.setAttribute('class','thread-label');
        label.setAttribute('x', mx); label.setAttribute('y', my-6);
        label.textContent = t.label;
        g.appendChild(label);
      }
      threadsLayer.appendChild(g);
    });

    state.blocks.forEach(b=>{
      const g = document.createElementNS(NS,'g');
      g.setAttribute('class','block-card');
      g.dataset.id = b.id;

      const rect = document.createElementNS(NS,'rect');
      rect.setAttribute('class','block-rect' + (selected.type==='block'&&selected.id===b.id?' selected':''));
      rect.setAttribute('x', b.x); rect.setAttribute('y', b.y);
      rect.setAttribute('width', b.w); rect.setAttribute('height', b.h);
      rect.setAttribute('rx', 8);
      rect.setAttribute('fill', b.color || '#1c2436');
      g.appendChild(rect);

      const tag = document.createElementNS(NS,'text');
      tag.setAttribute('class','block-tag');
      tag.setAttribute('x', b.x+10); tag.setAttribute('y', b.y+16);
      tag.textContent = b.tag;
      g.appendChild(tag);

      const title = document.createElementNS(NS,'text');
      title.setAttribute('class','block-title');
      title.setAttribute('x', b.x+10); title.setAttribute('y', b.y+34);
      title.textContent = b.label;
      g.appendChild(title);

      const desc = document.createElementNS(NS,'text');
      desc.setAttribute('class','block-desc');
      desc.setAttribute('x', b.x+10); desc.setAttribute('y', b.y+52);
      desc.textContent = (b.desc||'').slice(0,28);
      g.appendChild(desc);

      const ports = portPositions(b);
      Object.values(ports).forEach(p=>{
        const c = document.createElementNS(NS,'circle');
        c.setAttribute('class','port');
        c.setAttribute('cx', p.x); c.setAttribute('cy', p.y); c.setAttribute('r', 4);
        g.appendChild(c);
      });

      g.addEventListener('mousedown', e=>{
        e.stopPropagation();
        if(tool==='connect'){
          if(!connectFrom){ connectFrom = b.id; toast('Click target block to connect'); }
          else if(connectFrom !== b.id){
            const th = { id: uid('t'), tag:'LINK-'+Math.floor(Math.random()*900+100),
              label:'', desc:'', fromId: connectFrom, toId: b.id };
            state.threads.push(th);
            connectFrom = null;
            render();
          }
          return;
        }
        selectItem('block', b.id);
        const rectB = canvasWrap.getBoundingClientRect();
        const start = screenToWorld(e.clientX-rectB.left, e.clientY-rectB.top);
        dragging = { id:b.id, offX: start.x-b.x, offY: start.y-b.y };
      });
      g.addEventListener('dblclick', e=>{ e.stopPropagation(); openBlockModal(b.id); });

      blocksLayer.appendChild(g);
    });
  }

  function selectItem(type,id){ selected = {type,id}; render(); }
  function deleteSelected(){
    if(!selected.type) return;
    if(selected.type==='block'){
      state.blocks = state.blocks.filter(b=>b.id!==selected.id);
      state.threads = state.threads.filter(t=>t.fromId!==selected.id && t.toId!==selected.id);
    } else if(selected.type==='thread'){
      state.threads = state.threads.filter(t=>t.id!==selected.id);
    }
    selected = {type:null,id:null};
    render();
  }

  // ---- Pan / Zoom ----
  canvasWrap.addEventListener('mousedown', e=>{
    if(e.target === svg || e.target.id==='viewport'){
      panStart = { x:e.clientX, y:e.clientY, vx:view.x, vy:view.y };
      selected = {type:null,id:null}; render();
    }
  });
  window.addEventListener('mousemove', e=>{
    const rect = canvasWrap.getBoundingClientRect();
    if(dragging){
      const w = screenToWorld(e.clientX-rect.left, e.clientY-rect.top);
      const b = findBlock(dragging.id);
      if(b){ b.x = w.x - dragging.offX; b.y = w.y - dragging.offY; render(); }
    } else if(panStart){
      view.x = panStart.vx + (e.clientX - panStart.x);
      view.y = panStart.vy + (e.clientY - panStart.y);
      applyView();
    }
  });
  window.addEventListener('mouseup', ()=>{ dragging=null; panStart=null; });

  canvasWrap.addEventListener('wheel', e=>{
    e.preventDefault();
    const rect = canvasWrap.getBoundingClientRect();
    const mx = e.clientX-rect.left, my = e.clientY-rect.top;
    const before = screenToWorld(mx,my);
    const factor = e.deltaY < 0 ? 1.1 : 0.9;
    view.scale = Math.min(3, Math.max(0.2, view.scale*factor));
    const after = { x: before.x*view.scale + view.x, y: before.y*view.scale + view.y };
    view.x += mx-after.x; view.y += my-after.y;
    applyView();
  }, { passive:false });

  function fitToScreen(){
    if(state.blocks.length===0){ view={x:0,y:0,scale:1}; applyView(); return; }
    let minX=Infinity,minY=Infinity,maxX=-Infinity,maxY=-Infinity;
    state.blocks.forEach(b=>{
      minX=Math.min(minX,b.x); minY=Math.min(minY,b.y);
      maxX=Math.max(maxX,b.x+b.w); maxY=Math.max(maxY,b.y+b.h);
    });
    const rect = canvasWrap.getBoundingClientRect();
    const w = maxX-minX+80, h = maxY-minY+80;
    const scale = Math.min(rect.width/w, rect.height/h, 2);
    view.scale = scale;
    view.x = rect.width/2 - ((minX+maxX)/2)*scale;
    view.y = rect.height/2 - ((minY+maxY)/2)*scale;
    applyView();
  }

  // ---- Toolbar ----
  document.getElementById('btnSelect').addEventListener('click', ()=>setTool('select'));
  document.getElementById('btnConnect').addEventListener('click', ()=>setTool('connect'));
  document.getElementById('btnAddBlock').addEventListener('click', addBlock);
  document.getElementById('btnFit').addEventListener('click', fitToScreen);

  function setTool(t){
    tool = t; connectFrom = null;
    document.getElementById('btnSelect').classList.toggle('active', t==='select');
    document.getElementById('btnConnect').classList.toggle('active', t==='connect');
    canvasWrap.classList.toggle('connecting', t==='connect');
  }

  window.addEventListener('keydown', e=>{
    if(document.activeElement.tagName==='INPUT' || document.activeElement.tagName==='TEXTAREA') return;
    if(e.key==='v'||e.key==='V') setTool('select');
    else if(e.key==='c'||e.key==='C') setTool('connect');
    else if(e.key==='n'||e.key==='N') addBlock();
    else if(e.key==='Delete'||e.key==='Backspace') deleteSelected();
    else if(e.key==='Escape'){ connectFrom=null; selected={type:null,id:null}; render(); }
    else if(e.key==='Enter'){
      if(selected.type==='block') openBlockModal(selected.id);
      else if(selected.type==='thread') openThreadModal(selected.id);
    }
  });

  // ---- Modals ----
  const overlay = document.getElementById('modalOverlay');
  const modalContent = document.getElementById('modalContent');
  function closeModal(){ overlay.classList.remove('show'); modalContent.innerHTML=''; }
  overlay.addEventListener('mousedown', e=>{ if(e.target===overlay) closeModal(); });

  function openBlockModal(id){
    const b = findBlock(id); if(!b) return;
    modalContent.innerHTML = `
      <h3>Edit Block</h3>
      <label>ID / Tag</label><input type="text" id="m_tag" value="${escapeHtml(b.tag)}">
      <label>Title</label><input type="text" id="m_label" value="${escapeHtml(b.label)}">
      <label>Description</label><textarea id="m_desc">${escapeHtml(b.desc||'')}</textarea>
      <label>Color</label><input type="color" id="m_color" value="${b.color||'#0f3460'}">
      <div class="actions">
        <div class="left"><button id="m_delete">Delete</button></div>
        <div><button id="m_cancel">Cancel</button> <button id="m_save">Save</button></div>
      </div>`;
    overlay.classList.add('show');
    document.getElementById('m_cancel').onclick = closeModal;
    document.getElementById('m_save').onclick = ()=>{
      b.tag = document.getElementById('m_tag').value || b.tag;
      b.label = document.getElementById('m_label').value || b.label;
      b.desc = document.getElementById('m_desc').value;
      b.color = document.getElementById('m_color').value;
      closeModal(); render();
    };
    document.getElementById('m_delete').onclick = ()=>{
      state.blocks = state.blocks.filter(x=>x.id!==id);
      state.threads = state.threads.filter(t=>t.fromId!==id && t.toId!==id);
      closeModal(); render();
    };
  }

  function openThreadModal(id){
    const t = state.threads.find(x=>x.id===id); if(!t) return;
    modalContent.innerHTML = `
      <h3>Edit Thread</h3>
      <label>ID / Tag</label><input type="text" id="m_tag" value="${escapeHtml(t.tag||'')}">
      <label>Label</label><input type="text" id="m_label" value="${escapeHtml(t.label||'')}">
      <label>Description</label><textarea id="m_desc">${escapeHtml(t.desc||'')}</textarea>
      <div class="actions">
        <div class="left"><button id="m_delete">Delete</button></div>
        <div><button id="m_cancel">Cancel</button> <button id="m_save">Save</button></div>
      </div>`;
    overlay.classList.add('show');
    document.getElementById('m_cancel').onclick = closeModal;
    document.getElementById('m_save').onclick = ()=>{
      t.tag = document.getElementById('m_tag').value;
      t.label = document.getElementById('m_label').value;
      t.desc = document.getElementById('m_desc').value;
      closeModal(); render();
    };
    document.getElementById('m_delete').onclick = ()=>{
      state.threads = state.threads.filter(x=>x.id!==id);
      closeModal(); render();
    };
  }

  function escapeHtml(s){
    return (s||'').replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  // ---- Save / Load (localStorage) ----
  const STORAGE_KEY = 'blockThreadNotes_boards';
  function getAllBoards(){
    try{ return JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}'); }catch(e){ return {}; }
  }
  function saveBoard(){
    const name = boardNameInput.value.trim() || 'Untitled Board';
    const boards = getAllBoards();
    boards[name] = { name, blocks: state.blocks, threads: state.threads, savedAt: Date.now() };
    localStorage.setItem(STORAGE_KEY, JSON.stringify(boards));
    toast('Saved "' + name + '"');
  }
  function loadBoard(name){
    const boards = getAllBoards();
    const board = boards[name];
    if(!board) return;
    state.blocks = board.blocks || [];
    state.threads = board.threads || [];
    boardNameInput.value = board.name;
    selected = {type:null,id:null};
    render(); fitToScreen();
    closeModal();
    toast('Loaded "' + name + '"');
  }
  function deleteBoard(name){
    const boards = getAllBoards();
    delete boards[name];
    localStorage.setItem(STORAGE_KEY, JSON.stringify(boards));
    openBoardsModal();
  }
  function openBoardsModal(){
    const boards = getAllBoards();
    const names = Object.keys(boards).sort();
    modalContent.innerHTML = `
      <h3>Saved Boards</h3>
      <div id="boardsList">
        ${names.length ? names.map(n=>`
          <div class="boardRow">
            <span>${escapeHtml(n)}</span>
            <span>
              <button data-load="${escapeHtml(n)}">Load</button>
              <button data-del="${escapeHtml(n)}">Delete</button>
            </span>
          </div>`).join('') : '<p style="color:var(--muted);font-size:13px;">No saved boards yet.</p>'}
      </div>
      <div class="actions"><div></div><button id="m_close">Close</button></div>`;
    overlay.classList.add('show');
    document.getElementById('m_close').onclick = closeModal;
    modalContent.querySelectorAll('[data-load]').forEach(btn=>{
      btn.onclick = ()=> loadBoard(btn.dataset.load);
    });
    modalContent.querySelectorAll('[data-del]').forEach(btn=>{
      btn.onclick = ()=> deleteBoard(btn.dataset.del);
    });
  }

  // ---- URL hash share ----
  function encodeState(){
    const payload = { name: boardNameInput.value, blocks: state.blocks, threads: state.threads };
    return btoa(unescape(encodeURIComponent(JSON.stringify(payload))));
  }
  function decodeState(str){
    return JSON.parse(decodeURIComponent(escape(atob(str))));
  }
  function copyShareLink(){
    const hash = encodeState();
    const url = location.origin + location.pathname + '#b=' + hash;
    navigator.clipboard.writeText(url).then(()=> toast('Link copied to clipboard'))
      .catch(()=> toast('Could not copy — copy manually from address bar'));
    history.replaceState(null, '', '#b=' + hash);
  }
  function loadFromHash(){
    const h = location.hash;
    if(h.startsWith('#b=')){
      try{
        const data = decodeState(h.slice(3));
        state.blocks = data.blocks || [];
        state.threads = data.threads || [];
        boardNameInput.value = data.name || 'Shared Board';
        render(); fitToScreen();
        toast('Board loaded from link');
      }catch(e){ console.error(e); }
    }
  }

  // ---- JSON export / import ----
  function downloadFile(filename, content, mime){
    const blob = new Blob([content], { type: mime });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = filename;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(a.href);
  }

  function exportJson(){
    const name = boardNameInput.value.trim() || 'board';
    const payload = { name, blocks: state.blocks, threads: state.threads, exportedAt: new Date().toISOString() };
    downloadFile(name.replace(/[^a-z0-9-_]+/gi,'_') + '.json', JSON.stringify(payload, null, 2), 'application/json');
    toast('Exported ' + name + '.json');
  }

  function importJsonFile(file){
    const reader = new FileReader();
    reader.onload = ()=>{
      try{
        const data = JSON.parse(reader.result);
        state.blocks = data.blocks || [];
        state.threads = data.threads || [];
        boardNameInput.value = data.name || 'Imported Board';
        selected = {type:null,id:null};
        render(); fitToScreen();
        toast('Imported "' + boardNameInput.value + '"');
      }catch(e){ toast('Invalid JSON file'); console.error(e); }
    };
    reader.readAsText(file);
  }

  // ---- CSV export ----
  function csvEscape(v){
    v = String(v ?? '');
    if(/[",\n]/.test(v)) return '"' + v.replace(/"/g,'""') + '"';
    return v;
  }
  function exportCsv(){
    const blockHeaders = ['id','tag','label','description','x','y','width','height','color'];
    const blockRows = state.blocks.map(b => [b.id,b.tag,b.label,b.desc,b.x,b.y,b.w,b.h,b.color]);
    const blocksCsv = [blockHeaders.join(','), ...blockRows.map(r=>r.map(csvEscape).join(','))].join('\n');

    const threadHeaders = ['id','tag','label','description','from_block_id','to_block_id'];
    const threadRows = state.threads.map(t => [t.id,t.tag,t.label,t.desc,t.fromId,t.toId]);
    const threadsCsv = [threadHeaders.join(','), ...threadRows.map(r=>r.map(csvEscape).join(','))].join('\n');

    downloadFile('blocks.csv', blocksCsv, 'text/csv');
    downloadFile('threads.csv', threadsCsv, 'text/csv');
    toast('Exported blocks.csv and threads.csv');
  }

  // ---- Wire up buttons ----
  document.getElementById('btnSave').addEventListener('click', saveBoard);
  document.getElementById('btnBoards').addEventListener('click', openBoardsModal);
  document.getElementById('btnCopyLink').addEventListener('click', copyShareLink);
  document.getElementById('btnExportJson').addEventListener('click', exportJson);
  document.getElementById('btnExportCsv').addEventListener('click', exportCsv);

  const fileInput = document.getElementById('fileImportInput');
  document.getElementById('btnImportJson').addEventListener('click', ()=> fileInput.click());
  fileInput.addEventListener('change', e=>{
    if(e.target.files && e.target.files[0]) importJsonFile(e.target.files[0]);
    fileInput.value = '';
  });

  // ---- Init ----
  loadFromHash();
  if(state.blocks.length===0){
    state.blocks.push(newBlock(-160,-60));
    state.blocks.push(newBlock(80,60));
    state.threads.push({ id:uid('t'), tag:'LINK-100', label:'related to',
      desc:'', fromId: state.blocks[0].id, toId: state.blocks[1].id });
  }
  render();
  applyView();
  window.addEventListener('resize', fitToScreen);
  setTimeout(fitToScreen, 50);
})();
</script>
</body>
</html>
